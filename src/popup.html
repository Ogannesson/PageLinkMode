<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PageLinkMode</title>
  </head>
  <body>
    <main class="panel">
      <header class="toolbar">
        <div class="brand">
          <div class="brand-mark" aria-hidden="true">
            <span class="brand-arrow"></span>
          </div>
          <div class="brand-copy">
            <p class="eyebrow">PageLinkMode</p>
            <h1>链接跳转控制</h1>
          </div>
        </div>

        <button
          id="open-options"
          class="icon-button"
          type="button"
          aria-label="打开规则管理"
          title="打开规则管理"
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M10.2 2.8a1 1 0 0 1 1.6 0l.77 1.02a1.1 1.1 0 0 0 1.25.4l1.23-.45a1 1 0 0 1 1.38.8l.17 1.27a1.1 1.1 0 0 0 .95.9l1.3.18a1 1 0 0 1 .8 1.37l-.47 1.24a1.1 1.1 0 0 0 .4 1.24l1.03.78a1 1 0 0 1 0 1.6l-1.02.77a1.1 1.1 0 0 0-.4 1.25l.45 1.23a1 1 0 0 1-.8 1.38l-1.27.17a1.1 1.1 0 0 0-.9.95l-.18 1.3a1 1 0 0 1-1.37.8l-1.24-.47a1.1 1.1 0 0 0-1.24.4l-.78 1.03a1 1 0 0 1-1.6 0l-.77-1.02a1.1 1.1 0 0 0-1.25-.4l-1.23.45a1 1 0 0 1-1.38-.8l-.17-1.27a1.1 1.1 0 0 0-.95-.9l-1.3-.18a1 1 0 0 1-.8-1.37l.47-1.24a1.1 1.1 0 0 0-.4-1.24L2.8 13.8a1 1 0 0 1 0-1.6l1.02-.77a1.1 1.1 0 0 0 .4-1.25l-.45-1.23a1 1 0 0 1 .8-1.38l1.27-.17a1.1 1.1 0 0 0 .9-.95l.18-1.3a1 1 0 0 1 1.37-.8l1.24.47a1.1 1.1 0 0 0 1.24-.4l.78-1.03Z"
            />
            <circle cx="12" cy="12" r="3.2" />
          </svg>
        </button>
      </header>

      <section class="card status-card" id="status-card">
        <div class="site-heading">
          <span class="site-name" id="host-value">-</span>
          <span class="status-chip" id="status-chip">未加载</span>
        </div>

        <div class="effective-block">
          <p class="effective-label">当前生效</p>
          <strong class="effective-value" id="effective-value">-</strong>
          <p class="source-text" id="source-value">来源：-</p>
        </div>

        <div class="page-summary">
          <span>当前页面</span>
          <strong class="url-preview" id="page-value">-</strong>
        </div>

        <p class="subtle status-description" id="status-text">正在读取当前页面状态…</p>

        <div class="permission-banner" id="permission-card" hidden>
          <div class="permission-copy">
            <strong>当前站点未授权</strong>
            <p>授权后，插件才能真正接管这个站点里的网页跳转。</p>
          </div>
          <button id="grant-access" type="button">授权当前站点</button>
        </div>
      </section>

      <section class="card site-switch-card" id="site-section">
        <div class="section-head">
          <div>
            <p class="section-kicker">当前站点</p>
            <h2>站点级规则</h2>
          </div>
          <button
            id="site-override-toggle"
            class="switch"
            type="button"
            aria-pressed="false"
            aria-label="启用当前站点规则"
          >
            <span class="switch-track">
              <span class="switch-thumb"></span>
            </span>
          </button>
        </div>

        <p class="helper-text" id="site-helper-text">关闭后将继承全局默认模式。</p>

        <div class="segmented" id="site-mode-group" role="group" aria-label="当前站点规则模式">
          <button type="button" data-mode="same-tab">同标签页</button>
          <button type="button" data-mode="new-tab">新标签页</button>
        </div>
      </section>

      <section class="card advanced-card" id="advanced-section">
        <div class="advanced-block">
          <div class="inline-head">
            <div>
              <p class="section-kicker">当前页面</p>
              <h2>页面级规则</h2>
            </div>
            <button
              id="page-override-toggle"
              class="switch switch-small"
              type="button"
              aria-pressed="false"
              aria-label="启用当前页面规则"
            >
              <span class="switch-track">
                <span class="switch-thumb"></span>
              </span>
            </button>
          </div>

          <p class="helper-text" id="page-helper-text">关闭后将继承站点或全局规则。</p>

          <div class="segmented compact" id="page-mode-group" role="group" aria-label="当前页面规则模式">
            <button type="button" data-mode="same-tab">同标签页</button>
            <button type="button" data-mode="new-tab">新标签页</button>
          </div>
        </div>

        <div class="advanced-block global-block">
          <div class="inline-head">
            <div>
              <p class="section-kicker">全局默认</p>
              <h2>默认跳转方式</h2>
            </div>
          </div>

          <div class="segmented compact" id="global-mode-group" role="group" aria-label="全局默认模式">
            <button type="button" data-mode="same-tab">同标签页</button>
            <button type="button" data-mode="new-tab">新标签页</button>
          </div>
        </div>
      </section>
    </main>
    <script type="module" src="/src/popup.ts"></script>
  </body>
</html>
